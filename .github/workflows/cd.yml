name: CD

on:
  workflow_run:
    workflows: ['CI']
    branches: [main]
    types: [completed]

concurrency:
  group: cd-main
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      # nosemgrep: yaml.github-actions.security.workflow-run-target-code-checkout
      # Seguro: el filtro branches:[main] de workflow_run rechaza disparos desde
      # forks (que llevarían refs/pull/N/head, no main). Repo privado, sin PRs externos.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias (raíz)
        run: npm ci

      - name: Instalar dependencias (functions)
        working-directory: functions
        run: npm ci

      - name: Build front
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_BREVO_API_KEY: ${{ secrets.VITE_BREVO_API_KEY }}
          VITE_BREVO_NEWSLETTER_LIST_ID: ${{ secrets.VITE_BREVO_NEWSLETTER_LIST_ID }}
        run: npm run build

      - name: Auth Firebase (Service Account)
        run: |
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$RUNNER_TEMP/sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa.json" >> "$GITHUB_ENV"

      - name: Deploy a Firebase (hosting + functions + rules)
        run: npx firebase-tools deploy --project kalianhkg-886a6 --non-interactive
